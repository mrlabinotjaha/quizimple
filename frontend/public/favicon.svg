<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Subtle shine -->
  <rect width="32" height="32" rx="8" fill="url(#shine)"/>
  <!-- Question mark -->
  <text x="16" y="24.5" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="24" fill="white">?</text>
  <!-- Small sparkle top-right -->
  <circle cx="25" cy="5.5" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="27.5" cy="3" r="1" fill="white" opacity="0.5"/>
</svg>
